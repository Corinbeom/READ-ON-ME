## Development profile

# JPA/Hibernate
# - 개발 편의를 위해 매 실행 시 스키마를 재생성합니다.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.defer-datasource-initialization=false

# Flyway - 개발 환경에서는 비활성화 (ddl-auto가 스키마 관리)
spring.flyway.enabled=false

# 내부 통신용 토큰 (개발 기본값)
internal.api.token=${INTERNAL_API_TOKEN:dev-internal-token}

# Logging (verbose for debugging)
logging.level.org.springframework.cache=DEBUG
logging.level.org.springframework.data.redis=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.bookapp.bookappback.security=DEBUG
logging.level.bookapp.bookappback.common.util=DEBUG



